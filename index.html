<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGT Time</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23231F20'/%3E%3Ctext x='3' y='24' font-size='20' font-weight='900' fill='%23ED1C24' font-family='sans-serif'%3ETGT%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap');
:root{--bg:#1a1818;--bg2:#242121;--bg3:#2e2b2b;--bg4:#383434;--red:#ED1C24;--red2:#b51219;--w:#fff;--gray:#9D9D9C;--gray2:#575756;--b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);--r:8px;--green:#34d399;--amber:#fbbf24;--blue:#60a5fa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--w);min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer;border:none;outline:none}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* AUTH */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.abox{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:48px 40px;width:100%;max-width:400px}
.alogo{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center}
.atgt{font-size:40px;font-weight:900;color:var(--red);letter-spacing:-2px;line-height:1}
.asub{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:2px;text-transform:uppercase;line-height:1.4}
.atitle{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
.asub2{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
.fld{margin-bottom:18px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:12px 14px;color:var(--w);font-size:14px;transition:border-color .15s}
.inp:focus{border-color:var(--red);outline:none}
.inp::placeholder{color:var(--gray2)}
.inp option{background:var(--bg3)}
.btn-p{width:100%;background:var(--red);color:#fff;border-radius:var(--r);padding:13px;font-size:14px;font-weight:700;letter-spacing:.5px;transition:background .15s}
.btn-p:hover{background:var(--red2)}
.btn-p:disabled{opacity:.6;cursor:not-allowed}
.aerr{background:rgba(237,28,36,.12);border:1px solid rgba(237,28,36,.3);color:#f87171;border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.aerr.show{display:block}

/* LAYOUT */
#app{display:none;min-height:100vh}
.sb{width:220px;background:var(--bg2);border-right:1px solid var(--b);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:transform .3s}
.sblogo{padding:20px 20px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.sbtgt{font-size:26px;font-weight:900;color:var(--red);letter-spacing:-1.5px;line-height:1}
.sbdiv{width:2px;height:22px;background:var(--b2);border-radius:2px}
.sbsub{font-size:9px;font-weight:700;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;line-height:1.6}
.nav{padding:8px 0;flex:1;overflow-y:auto}
.nsec{font-size:9px;font-weight:700;color:var(--gray2);letter-spacing:1.5px;text-transform:uppercase;padding:10px 20px 4px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:var(--gray);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.ni:hover{background:var(--b);color:var(--w)}
.ni.active{background:rgba(237,28,36,.1);color:var(--red);border-left-color:var(--red)}
.ni svg{flex-shrink:0}
.sbusr{padding:14px 20px;border-top:1px solid var(--b);display:flex;align-items:center;gap:10px}
.usrav{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.usrname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.usrrole{font-size:10px;color:var(--gray)}
.btnout{background:none;color:var(--gray2);padding:4px;border-radius:4px;transition:color .15s}
.btnout:hover{color:var(--red)}

.main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--b);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.tbtitle{font-size:15px;font-weight:700}
.content{padding:28px;flex:1}

/* TIMER BAR */
.tbar{background:var(--bg2);border-radius:12px;border:1px solid var(--b);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tinp{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:10px 14px;color:var(--w);font-size:13px}
.tinp::placeholder{color:var(--gray2)}
.tinp:focus{outline:none;border-color:var(--red)}
.tinp:disabled{opacity:.5;cursor:not-allowed}
.tsel{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:10px 14px;color:var(--w);font-size:13px;min-width:150px}
.tsel:focus{outline:none;border-color:var(--red)}
.tsel:disabled{opacity:.5;cursor:not-allowed}
.tsel option{background:var(--bg3)}
.tclock{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:2px;min-width:100px;text-align:center}
.tclock.on{color:var(--red)}
.bgo{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--red);color:#fff;border-radius:var(--r);padding:10px 22px;font-size:13px;font-weight:700;transition:all .15s}
.bgo:hover{background:var(--red2)}
.bstop{background:var(--bg3);border:1px solid rgba(237,28,36,.4);color:var(--red)}
.bstop:hover{background:rgba(237,28,36,.1)}

/* CARDS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:18px 20px}
.slbl{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray);margin-bottom:8px}
.sval{font-size:28px;font-weight:900;line-height:1}
.ssub{font-size:11px;color:var(--gray);margin-top:4px}
.sprog{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden}
.sprogb{height:100%;background:var(--red);border-radius:2px;transition:width .3s}

/* FILTERS BAR - TMetric style */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fsel{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:7px 12px;color:var(--w);font-size:12px;font-weight:500}
.fsel:focus{outline:none;border-color:var(--red)}
.fsel option{background:var(--bg3)}
.fbtn{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:7px 14px;color:var(--w);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--red);color:var(--red)}
.fbtn.active{background:rgba(237,28,36,.12);border-color:var(--red);color:var(--red)}
.fdivider{width:1px;height:24px;background:var(--b2);margin:0 4px}

/* TABLE */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.stitle{font-size:14px;font-weight:700}
.tw{background:var(--bg2);border:1px solid var(--b);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg3);padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);text-align:left;white-space:nowrap}
tbody tr{border-top:1px solid var(--b)}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:11px 16px;font-size:13px}
.tg{color:var(--gray)}
.tr{color:var(--red);font-weight:600;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-t1{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-t3{background:rgba(168,85,247,.15);color:#c084fc}
.badge-t4{background:rgba(6,182,212,.15);color:#22d3ee}
.badge-pack{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-prod{background:rgba(52,211,153,.15);color:#34d399}
.badge-adm{background:rgba(157,157,156,.15);color:#9D9D9C}
.empty{padding:40px;text-align:center;color:var(--gray);font-size:13px}

/* RUNNING INDICATOR */
.rdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;margin-right:5px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.running-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(237,28,36,.12);color:var(--red)}
.running-row{background:rgba(237,28,36,.03) !important}

/* BUTTONS */
.bsm{background:var(--bg3);border:1px solid var(--b2);color:var(--w);border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;transition:all .15s}
.bsm:hover{background:var(--bg4)}
.bsmr{background:rgba(237,28,36,.12);border:1px solid rgba(237,28,36,.3);color:var(--red);border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;transition:all .15s}
.bsmr:hover{background:rgba(237,28,36,.2)}
.bsmg{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--green);border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;transition:all .15s}
.bsmg:hover{background:rgba(52,211,153,.2)}
.role-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-left:4px}
.rb-admin{background:rgba(237,28,36,.2);color:var(--red)}
.rb-account{background:rgba(69,94,110,.3);color:#8ab4c8}
.rb-user{background:rgba(87,87,86,.3);color:var(--gray)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--b)}
.mtitle{font-size:15px;font-weight:700}
.bx{background:var(--bg3);border:1px solid var(--b2);color:var(--gray);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s}
.bx:hover{color:var(--w)}
.mb{padding:24px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{padding:16px 24px;border-top:1px solid var(--b);display:flex;gap:10px;justify-content:flex-end}
.bcan{background:var(--bg3);border:1px solid var(--b2);color:var(--w);border-radius:var(--r);padding:10px 18px;font-size:13px;font-weight:600;transition:all .15s}
.bcan:hover{background:var(--bg4)}
.bsave{background:var(--red);color:#fff;border-radius:var(--r);padding:10px 20px;font-size:13px;font-weight:700;transition:background .15s}
.bsave:hover{background:var(--red2)}
.bsave:disabled{opacity:.6;cursor:not-allowed}

/* REPORT */
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.rc{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:20px}
.rct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:16px}
.rrow{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--b)}
.rrow:last-child{border-bottom:none}
.rname{font-size:13px;font-weight:500;flex:0 0 130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbarw{flex:1;height:4px;background:var(--bg4);border-radius:2px;margin:0 12px;overflow:hidden}
.rbar{height:100%;background:var(--red);border-radius:2px}
.rhours{font-size:13px;font-weight:700;color:var(--red);flex:0 0 55px;text-align:right;font-variant-numeric:tabular-nums}

/* ADMIN */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.acard{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:20px}
.actitle{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.assoc-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.assoc-tag{background:var(--bg3);border:1px solid var(--b2);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}
.assoc-tag button{background:none;color:var(--gray2);font-size:13px;line-height:1;padding:0;transition:color .15s}
.assoc-tag button:hover{color:var(--red)}
.section-info{font-size:12px;color:var(--gray);margin-bottom:16px}

/* DAY GROUP - Detailed report style */
.day-group{margin-bottom:20px}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg3);border-radius:8px 8px 0 0;border:1px solid var(--b)}
.day-header-date{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.day-header-total{font-size:13px;font-weight:700;color:var(--red);font-variant-numeric:tabular-nums}
.day-entries{border:1px solid var(--b);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}

/* TOAST */
#toastc{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--b2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;min-width:240px;display:flex;align-items:center;gap:10px;animation:sIn .2s ease}
.toast.success{border-color:rgba(52,211,153,.4);color:var(--green)}
.toast.error{border-color:rgba(237,28,36,.4);color:#f87171}
.toast.info{border-color:rgba(96,165,250,.4);color:#60a5fa}
@keyframes sIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* UTILS */
.spin{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--red);border-radius:50%;animation:ro .7s linear infinite;flex-shrink:0}
@keyframes ro{to{transform:rotate(360deg)}}
.lc{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--gray);font-size:13px}
.divider{height:1px;background:var(--b);margin:16px 0}

@media(max-width:768px){
  .sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}
  .main{margin-left:0}.topbar{padding:0 16px}.content{padding:16px}
  .frow{grid-template-columns:1fr}.tclock{font-size:20px}
  #mbtn{display:flex !important}
  .filters{gap:6px}.fsel{font-size:11px;padding:6px 8px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="abox">
    <div class="alogo">
      <span class="atgt">TGT</span>
      <div><div class="asub">Time</div><div style="font-size:8px;color:var(--gray2);letter-spacing:1px;margin-top:2px">CONTROLE DE HORAS</div></div>
    </div>
    <h2 class="atitle">Acesso</h2>
    <p class="asub2">Entre com suas credenciais TGT Studio</p>
    <div id="aerr" class="aerr"></div>
    <form id="lform">
      <div class="fld"><label class="lbl">E-mail</label><input class="inp" id="femail" type="email" placeholder="seu@tgtstudio.com.br" required></div>
      <div class="fld"><label class="lbl">Senha</label><input class="inp" id="fpass" type="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn-p" id="lbtn">Entrar</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sb" id="sb">
    <div class="sblogo">
      <span class="sbtgt">TGT</span><div class="sbdiv"></div>
      <div class="sbsub">Time<br>Tracker</div>
    </div>
    <nav class="nav" id="mainnav"></nav>
    <div class="sbusr">
      <div class="usrav" id="uav">?</div>
      <div style="flex:1;min-width:0">
        <div class="usrname" id="uname">—</div>
        <div class="usrrole" id="urole">—</div>
      </div>
      <button class="btnout" onclick="doLogout()" title="Sair">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="mbtn" onclick="toggleSb()" style="display:none;background:none;color:var(--w);padding:4px">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="tbtitle" id="pgtitle">Timer</span>
      </div>
      <span style="font-size:12px;color:var(--gray)" id="curdate"></span>
    </div>
    <div class="content" id="pg"></div>
  </div>
</div>

<!-- MODALS -->
<div class="mov" id="m-entry">
  <div class="modal">
    <div class="mh"><span class="mtitle" id="m-entry-t">Novo Lançamento</span><button class="bx" onclick="closeM('m-entry')">✕</button></div>
    <div class="mb">
      <div class="fld"><label class="lbl">Descrição</label><input class="inp" id="e-desc" placeholder="Ex: Criação de posts semana 1"></div>
      <div class="frow">
        <div class="fld"><label class="lbl">Data</label><input class="inp" id="e-date" type="date"></div>
        <div class="fld"><label class="lbl">Horas</label><input class="inp" id="e-hours" type="number" step="0.25" min="0.25" max="24" placeholder="2.5"></div>
      </div>
      <div class="frow">
        <div class="fld"><label class="lbl">Cliente</label><select class="inp" id="e-client" onchange="loadProjectsForEntry()"></select></div>
        <div class="fld"><label class="lbl">Projeto</label><select class="inp" id="e-project"><option value="">Selecionar</option></select></div>
      </div>
      <div class="fld" id="e-member-wrap"><label class="lbl">Pessoa</label><select class="inp" id="e-member"></select></div>
    </div>
    <div class="mf">
      <button class="bcan" onclick="closeM('m-entry')">Cancelar</button>
      <button class="bsave" id="e-save" onclick="saveEntry()">Salvar</button>
    </div>
  </div>
</div>

<div class="mov" id="m-member">
  <div class="modal">
    <div class="mh"><span class="mtitle" id="m-member-t">Nova Pessoa</span><button class="bx" onclick="closeM('m-member')">✕</button></div>
    <div class="mb">
      <div class="fld"><label class="lbl">Nome Completo</label><input class="inp" id="mb-name" placeholder="Nome"></div>
      <div class="frow">
        <div class="fld"><label class="lbl">E-mail</label><input class="inp" id="mb-email" type="email" placeholder="email@tgtstudio.com.br"></div>
        <div class="fld"><label class="lbl">Função</label><input class="inp" id="mb-role-inp" placeholder="Designer"></div>
      </div>
      <div class="frow">
        <div class="fld"><label class="lbl">Time</label>
          <select class="inp" id="mb-team"><option value="T1">T1</option><option value="T3">T3</option><option value="T4">T4</option><option value="PACK">Pack</option><option value="PROD">PROD</option><option value="ADM">ADM</option></select>
        </div>
        <div class="fld"><label class="lbl">Nível de Acesso</label>
          <select class="inp" id="mb-access"><option value="user">Operador / User</option><option value="account">Account</option><option value="admin">ADM Full</option></select>
        </div>

async function req(method,path,body,tok){
  const h={'Content-Type':'application/json','apikey':KEY,'Authorization':`Bearer ${tok||KEY}`};
  if(method==='POST'||method==='PATCH')h['Prefer']='return=representation';
  const r=await fetch(`${SB}/rest/v1/${path}`,{method,headers:h,body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText)}
  if(r.status===204)return null;
  return r.json();
}
async function authReq(method,path,body){
  const h={'Content-Type':'application/json','apikey':KEY};
  const r=await fetch(`${SB}/auth/v1/${path}`,{method,headers:h,body:JSON.stringify(body)});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error_description||d.msg||'Erro de autenticação');
  return d;
}

function getDateRange(){
  const today=new Date();
  const fmt=d=>d.toISOString().split('T')[0];
  const mon=d=>{const r=new Date(d);r.setDate(r.getDate()-(r.getDay()||7)+1);return r;};
  switch(dateRange){
    case 'today':return{from:fmt(today),to:fmt(today)};
    case 'yesterday':{const y=new Date(today);y.setDate(y.getDate()-1);return{from:fmt(y),to:fmt(y)};}
    case 'week':return{from:fmt(mon(today)),to:fmt(today)};
    case 'lastweek':{const s=mon(today);s.setDate(s.getDate()-7);const e=new Date(s);e.setDate(e.getDate()+6);return{from:fmt(s),to:fmt(e)};}
    case 'month':return{from:fmt(new Date(today.getFullYear(),today.getMonth(),1)),to:fmt(today)};
    case 'lastmonth':{const s=new Date(today.getFullYear(),today.getMonth()-1,1);const e=new Date(today.getFullYear(),today.getMonth(),0);return{from:fmt(s),to:fmt(e)};}
    case 'custom':return{from:customFrom||fmt(new Date(today.getFullYear(),today.getMonth(),1)),to:customTo||fmt(today)};
    case 'all':return{from:'2024-01-01',to:fmt(today)};
    default:return{from:fmt(mon(today)),to:fmt(today)};
  }
}

function startTick(){clearInterval(timerInt);timerInt=setInterval(()=>{if(timerStart){timerSec=(Date.now()-timerStart.getTime())/1000;updClock();}},1000);}
function updClock(){const el=document.getElementById('tclock');if(!el)return;const h=Math.floor(timerSec/3600),m=Math.floor((timerSec%3600)/60),s=Math.floor(timerSec%60);el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;el.className='tclock'+(running?' on':'');}

async function startTimer(){
  const desc=document.getElementById('tdesc')?.value?.trim();
  const cid=document.getElementById('tclient')?.value;
  const pid=document.getElementById('tproject')?.value;
  if(!desc){toast('Informe uma descrição','error');return;}
  if(!cid){toast('Selecione um cliente','error');return;}
  if(!me){toast('Membro não encontrado','error');return;}
  // Check if user already has a running entry in DB
  try{
    const check=await req('GET',`tt_time_entries?member_id=eq.${me.id}&is_running=eq.true&select=id,description`,null,tok());
    if(check&&check.length>0){
      // Auto-stop the running entry first
      const now=new Date().toISOString();
      await req('PATCH',`tt_time_entries?id=eq.${check[0].id}`,{is_running:false,ended_at:now},tok());
      toast(`Timer anterior parado: "${check[0].description.substring(0,30)}"`, 'info');
    }
  }catch{}
  const now=new Date().toISOString();
  running={description:desc,client_id:cid,project_id:pid||null,member_id:me.id,started_at:now,date:now.split('T')[0]};
  timerStart=new Date(now);timerSec=0;
  localStorage.setItem('tgt_run',JSON.stringify(running));
  startTick();renderPage();toast('Timer iniciado','success');
}

async function stopTimer(){
  if(!running||!timerStart)return;
  clearInterval(timerInt);
  const hours=timerSec/3600;
  if(hours<0.003){toast('Tempo muito curto (mín. 10s)','error');resetTimer();return;}
  try{
    await req('POST','tt_time_entries',{description:running.description,client_id:running.client_id,project_id:running.project_id||null,member_id:running.member_id,date:running.date,hours:Math.round(hours*100)/100,duration_minutes:Math.round(timerSec/60*100)/100,started_at:running.started_at,ended_at:new Date().toISOString(),is_running:false,is_manual:false},tok());
    toast(`${fmtH(hours)} registradas`,'success');resetTimer();
    if(curPage==='entries')renderPage();else if(curPage==='timer')renderPage();
  }catch(ex){toast('Erro: '+ex.message,'error');}
}
function resetTimer(){running=null;timerStart=null;timerSec=0;localStorage.removeItem('tgt_run');clearInterval(timerInt);}

async function loadStats(todayD){

    const mH=mD.reduce((a,e)=>a+(e.hours||0),0),cap=me.capacity_hours_month||140,pct=Math.min(100,Math.round(mH/cap*100));

function setDateRange(r){dateRange=r;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.textContent===DATE_LABELS[r]));const cr=document.getElementById('custom-range');if(cr)cr.style.display=r==='custom'?'flex':'none';loadETable();}

async function loadETable(){
  const w=document.getElementById('etable');if(!w)return;
  w.innerHTML='<div class="lc"><div class="spin"></div></div>';
  try{
    const{from,to}=getDateRange();
    let q=`tt_time_entries?select=*,member:tt_members(id,name,team),client:tt_clients(id,name),project:tt_projects(id,name)&order=date.desc,created_at.desc&is_running=eq.false&date=gte.${from}&date=lte.${to}`;
    if(fMember)q+=`&member_id=eq.${fMember}`;
    else if(me?.access_level==='user')q+=`&member_id=eq.${me.id}`;
    if(fClient)q+=`&client_id=eq.${fClient}`;
    if(fProject)q+=`&project_id=eq.${fProject}`;
    allEntries=await req('GET',q,null,tok())||[];
    if(me?.access_level==='account'&&!fMember){const mids=acMembers[me.id]||[];allEntries=allEntries.filter(e=>mids.includes(e.member_id));}
    if(fTeam)allEntries=allEntries.filter(e=>e.member?.team===fTeam);
    if(!allEntries.length){w.innerHTML='<div class="empty">Nenhum lançamento no período selecionado.</div>';return;}
    const tot=allEntries.reduce((a,e)=>a+(e.hours||0),0);
    // Group by day
    const days={};
    allEntries.forEach(e=>{const d=e.date||'sem-data';if(!days[d])days[d]=[];days[d].push(e);});
    let html=`<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--gray)">${allEntries.length} lançamentos</span>
      <span style="font-size:14px;font-weight:700">${fmtH(tot)} total</span>
    </div>`;
    Object.entries(days).forEach(([date,entries])=>{
      const dayTot=entries.reduce((a,e)=>a+(e.hours||0),0);
      const dayLabel=fmtDate(date);
      html+=`<div class="day-group">
        <div class="day-header"><span class="day-header-date">${dayLabel}</span><span class="day-header-total">${fmtH(dayTot)}</span></div>
        <div class="day-entries"><table><tbody>`;
      entries.forEach(e=>{
        html+=`<tr>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.description||'—'}</td>
          <td>${e.client?.name||'—'}</td>
          <td class="tg">${e.project?.name||'—'}</td>
          ${isAccount()?`<td>${teamBadge(e.member?.team)} ${e.member?.name?.split(' ')[0]||'—'}</td>`:''}
          <td class="tr">${fmtH(e.hours||0)}</td>
          <td style="white-space:nowrap">
            <button class="bsm" onclick="resumeEntry('${e.id}')" title="Retomar" style="padding:4px 8px;font-size:11px;margin-right:2px;color:var(--green)">▶</button>
            <button class="bsm" onclick="editEntry('${e.id}')" style="padding:4px 8px;font-size:11px;margin-right:2px">✎</button>
            <button class="bsm" onclick="delEntry('${e.id}')" style="padding:4px 8px;font-size:11px;color:var(--gray2)">✕</button>
          </td>
        </tr>`;
      });
      html+='</tbody></table></div></div>';
    });
    w.innerHTML=html;
  }catch(ex){w.innerHTML=`<div class="empty">Erro: ${ex.message}</div>`;}
}

function editEntry(id){
  const e=allEntries.find(x=>x.id===id);if(!e)return;editId=id;
  document.getElementById('m-entry-t').textContent='Editar';document.getElementById('e-desc').value=e.description||'';document.getElementById('e-date').value=e.date||'';document.getElementById('e-hours').value=e.hours||'';
  const mc=myClients(),mm=myMembers();
  document.getElementById('e-client').innerHTML='<option value="">Selecionar</option>'+mc.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');document.getElementById('e-client').value=e.client_id||'';
  loadProjectsForEntry();setTimeout(()=>{document.getElementById('e-project').value=e.project_id||'';},100);
  const mw=document.getElementById('e-member-wrap');
  if(me?.access_level==='user'){mw.style.display='none';}else{mw.style.display='';document.getElementById('e-member').innerHTML='<option value="">Selecionar</option>'+mm.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');document.getElementById('e-member').value=e.member_id||'';}
  openM('m-entry');
}
function loadProjectsForEntry(){const cid=document.getElementById('e-client')?.value;const ps=document.getElementById('e-project');if(!ps)return;ps.innerHTML='<option value="">Sem projeto</option>'+myProjects(cid).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');}
async function saveEntry(){
  const btn=document.getElementById('e-save');const mid=me?.access_level==='user'?me.id:document.getElementById('e-member').value;
  const p={description:document.getElementById('e-desc').value.trim(),date:document.getElementById('e-date').value,hours:parseFloat(document.getElementById('e-hours').value),client_id:document.getElementById('e-client').value,project_id:document.getElementById('e-project').value||null,member_id:mid,is_manual:true,is_running:false};
  if(!p.description||!p.date||!p.hours||!p.client_id||!p.member_id){toast('Preencha todos os campos','error');return;}
  p.duration_minutes=Math.round(p.hours*60*100)/100;
  btn.disabled=true;btn.textContent='Salvando...';
  try{if(editId)await req('PATCH',`tt_time_entries?id=eq.${editId}`,p,tok());else await req('POST','tt_time_entries',p,tok());
  toast(editId?'Atualizado':'Salvo','success');closeM('m-entry');renderPage();}catch(ex){toast('Erro: '+ex.message,'error');}
  finally{btn.disabled=false;btn.textContent='Salvar';}
}
async function delEntry(id){
  const e=allEntries.find(x=>x.id===id);
  if(!confirm(`Excluir "${(e?.description||'lançamento').substring(0,40)}"?`))return;
  try{await req('DELETE',`tt_time_entries?id=eq.${id}`,null,tok());allEntries=allEntries.filter(e=>e.id!==id);toast('Removido','success');renderPage();}catch(ex){toast('Erro: '+ex.message,'error');}
}

// MEMBER MODAL
let editMemberId=null;
function openNewMember(){editMemberId=null;document.getElementById('m-member-t').textContent='Nova Pessoa';document.getElementById('mb-name').value='';document.getElementById('mb-email').value='';document.getElementById('mb-role-inp').value='';document.getElementById('mb-team').value='T1';document.getElementById('mb-access').value='user';document.getElementById('mb-cap').value='140';document.getElementById('mb-monday').value='';document.getElementById('mb-pass').value='';openM('m-member');}
function editMember(id){editMemberId=id;const m=members.find(x=>x.id===id);if(!m)return;document.getElementById('m-member-t').textContent='Editar';document.getElementById('mb-name').value=m.name||'';document.getElementById('mb-email').value=m.email||'';document.getElementById('mb-role-inp').value=m.job_title||'';document.getElementById('mb-team').value=(m.team==='Pack'?'PACK':m.team)||'T1';document.getElementById('mb-access').value=m.access_level||'user';document.getElementById('mb-cap').value=m.capacity_hours_month||140;document.getElementById('mb-monday').value=m.monday_user_id||'';document.getElementById('mb-pass').value='';openM('m-member');}
async function saveMember(){
  const name=document.getElementById('mb-name').value.trim(),email=document.getElementById('mb-email').value.trim(),job_title=document.getElementById('mb-role-inp').value.trim(),team=document.getElementById('mb-team').value,access_level=document.getElementById('mb-access').value,capacity_hours_month=parseInt(document.getElementById('mb-cap').value)||140,monday_user_id=document.getElementById('mb-monday').value.trim()||null;
  if(!name){toast('Nome obrigatório','error');return;}
  const btn=document.getElementById('mb-save');btn.disabled=true;btn.textContent='Salvando...';
  try{
    if(editMemberId){await req('PATCH',`tt_members?id=eq.${editMemberId}`,{name,job_title,team,access_level,capacity_hours_month,monday_user_id},tok());}
    else{await req('POST','tt_members',{name,email,job_title,team,access_level,capacity_hours_month,monday_user_id},tok());}
    toast(editMemberId?'Atualizado':'Adicionado','success');closeM('m-member');await loadAll();buildNav();renderPage();
  }catch(ex){toast('Erro: '+ex.message,'error');}finally{btn.disabled=false;btn.textContent='Salvar';}
}
async function confirmDelMember(btn){const id=btn.dataset.id,name=btn.dataset.name;if(!confirm('Remover '+name+'?'))return;try{await req('DELETE',`tt_members?id=eq.${id}`,null,tok());toast('Removido','success');await loadAll();buildNav();renderPage();}catch(ex){toast('Erro: '+ex.message,'error');}}

// CLIENT MODAL
let editClientId=null;
function openNewClient(){editClientId=null;document.getElementById('m-client-t').textContent='Novo Cliente';document.getElementById('cl-name').value='';document.getElementById('cl-team').value='T1';document.getElementById('cl-target').value='';openM('m-client');}
function editClient(id){editClientId=id;const c=clients.find(x=>x.id===id);if(!c)return;document.getElementById('m-client-t').textContent='Editar';document.getElementById('cl-name').value=c.name||'';document.getElementById('cl-team').value=c.team||'T1';document.getElementById('cl-target').value=c.target_hours_month||'';openM('m-client');}

// PROJECT MODAL
function openNewProject(){document.getElementById('pr-name').value='';document.getElementById('pr-desc').value='';document.getElementById('pr-client').innerHTML='<option value="">Selecionar</option>'+clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');openM('m-project');}
async function saveProject(){
  const p={name:document.getElementById('pr-name').value.trim(),client_id:document.getElementById('pr-client').value,description:document.getElementById('pr-desc').value.trim()||null};
  if(!p.name||!p.client_id){toast('Nome e cliente obrigatórios','error');return;}
  try{await req('POST','tt_projects',p,tok());toast('Adicionado','success');closeM('m-project');await loadAll();renderPage();}catch(ex){toast('Erro: '+ex.message,'error');}
}
async function delProject(id){if(!confirm('Excluir este projeto?'))return;try{await req('DELETE',`tt_projects?id=eq.${id}`,null,tok());toast('Removido','success');await loadAll();renderPage();}catch(ex){toast('Erro: '+ex.message,'error');}}

// EXPORT
function exportCsv(){
  if(!allEntries.length){toast('Sem dados','error');return;}
  const rows=[['Data','Descrição','Cliente','Projeto','Pessoa','Time','Horas']];
  allEntries.forEach(e=>rows.push([e.date,e.description||'',e.client?.name||clients.find(c=>c.id==e.client_id)?.name||'',e.project?.name||projects.find(p=>p.id==e.project_id)?.name||'',e.member?.name||members.find(m=>m.id==e.member_id)?.name||'',e.member?.team||'',String(e.hours||0).replace('.',',')]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(';')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`tgt-time-${getDateRange().from}_${getDateRange().to}.csv`;a.click();
}

// HELPERS
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function fmtH(h){if(!h||h===0)return'0h';const n=Math.round(h*100)/100;if(n>=1)return n.toFixed(1)+'h';const m=Math.round(n*60);return m+'min';}
function fmtD(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}`;}
function fmtDate(d){if(!d)return'—';try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});}catch{return d;}}
function toggleSb(){document.getElementById('sb').classList.toggle('open');}
function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span> ${msg}`;document.getElementById('toastc').appendChild(el);setTimeout(()=>el.remove(),3500);}

if(window.innerWidth<=768)document.getElementById('mbtn').style.display='flex';
window.addEventListener('resize',()=>{const b=document.getElementById('mbtn');if(b)b.style.display=window.innerWidth<=768?'flex':'none';});

// SESSION RESTORE
async function refreshSession(s){try{const r=await fetch(`${SB}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({refresh_token:s.refresh_token})});if(r.ok){const ns=await r.json();localStorage.setItem('tgt_sess',JSON.stringify(ns));return ns;}}catch{}return null;}

(async()=>{
  const sv=localStorage.getItem('tgt_sess');
  if(sv){try{const s=JSON.parse(sv);const r=await fetch(`${SB}/auth/v1/user`,{headers:{apikey:KEY,Authorization:`Bearer ${s.access_token}`}});
  if(r.ok){sess=s;await boot();return;}const ns=await refreshSession(s);if(ns){sess=ns;await boot();return;}}catch{}localStorage.removeItem('tgt_sess');}
  document.getElementById('auth').style.display='flex';
})();
</script>
