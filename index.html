<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGT Time</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23231F20'/%3E%3Ctext x='4' y='24' font-size='22' font-weight='900' fill='%23ED1C24' font-family='sans-serif'%3ET%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap');
  :root{--bg:#1a1818;--bg2:#242121;--bg3:#2e2b2b;--bg4:#383434;--red:#ED1C24;--red2:#b51219;--white:#fff;--cream:#E2DBCE;--gray:#9D9D9C;--gray2:#575756;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--radius:8px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden}
  input,select,textarea,button{font-family:inherit}
  button{cursor:pointer;border:none;outline:none}
  #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:48px 40px;width:100%;max-width:400px}
  .auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center}
  .auth-logo-tgt{font-size:40px;font-weight:900;color:var(--red);letter-spacing:-2px;line-height:1}
  .auth-logo-sub{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:2px;text-transform:uppercase;line-height:1.4}
  .auth-title{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
  .auth-sub{font-size:13px;color:var(--gray);text-align:center;margin-bottom:28px}
  .f-label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
  .f-field{margin-bottom:18px}
  .f-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px;color:var(--white);font-size:14px;transition:border-color .15s}
  .f-input:focus{border-color:var(--red);outline:none}
  .f-input::placeholder{color:var(--gray2)}
  .btn-primary{width:100%;background:var(--red);color:#fff;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:700;letter-spacing:.5px;transition:background .15s}
  .btn-primary:hover{background:var(--red2)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .auth-error{background:rgba(237,28,36,.12);border:1px solid rgba(237,28,36,.3);color:#f87171;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
  .auth-error.show{display:block}
  #app{display:none;min-height:100vh}
  .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:transform .3s}
  .s-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .s-tgt{font-size:26px;font-weight:900;color:var(--red);letter-spacing:-1.5px;line-height:1}
  .s-divider{width:2px;height:22px;background:var(--border2);border-radius:2px}
  .s-sub{font-size:9px;font-weight:700;color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;line-height:1.6}
  nav{padding:10px 0;flex:1;overflow-y:auto}
  .n-sec{font-size:9px;font-weight:700;color:var(--gray2);letter-spacing:1.5px;text-transform:uppercase;padding:10px 20px 4px}
  .n-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:var(--gray);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
  .n-item:hover{background:var(--border);color:var(--white)}
  .n-item.active{background:rgba(237,28,36,.1);color:var(--red);border-left-color:var(--red)}
  .n-item svg{flex-shrink:0}
  .s-user{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .s-avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .s-uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .s-urole{font-size:10px;color:var(--gray)}
  .btn-logout{background:none;color:var(--gray2);padding:4px;border-radius:4px;transition:color .15s}
  .btn-logout:hover{color:var(--red)}
  .main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
  .t-title{font-size:15px;font-weight:700}
  .content{padding:28px;flex:1}
  .timer-bar{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .t-input{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;color:var(--white);font-size:13px}
  .t-input::placeholder{color:var(--gray2)}
  .t-input:focus{outline:none;border-color:var(--red)}
  .t-select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;color:var(--white);font-size:13px;min-width:160px}
  .t-select:focus{outline:none;border-color:var(--red)}
  .t-select option{background:var(--bg3)}
  .t-clock{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:2px;min-width:100px;text-align:center}
  .t-clock.on{color:var(--red)}
  .btn-go{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--red);color:#fff;border-radius:var(--radius);padding:10px 22px;font-size:13px;font-weight:700;transition:all .15s}
  .btn-go:hover{background:var(--red2)}
  .btn-stop{background:var(--bg3);border:1px solid rgba(237,28,36,.4);color:var(--red)}
  .btn-stop:hover{background:rgba(237,28,36,.1)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
  .stat-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray);margin-bottom:8px}
  .stat-val{font-size:28px;font-weight:900;line-height:1}
  .stat-sub{font-size:11px;color:var(--gray);margin-top:4px}
  .stat-prog{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden}
  .stat-prog-bar{height:100%;background:var(--red);border-radius:2px;transition:width .3s}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sec-title{font-size:14px;font-weight:700}
  .btn-sm{background:var(--bg3);border:1px solid var(--border2);color:var(--white);border-radius:var(--radius);padding:7px 14px;font-size:12px;font-weight:600;transition:all .15s}
  .btn-sm:hover{background:var(--bg4)}
  .btn-smred{background:rgba(237,28,36,.12);border:1px solid rgba(237,28,36,.3);color:var(--red);border-radius:var(--radius);padding:7px 14px;font-size:12px;font-weight:600;transition:all .15s}
  .btn-smred:hover{background:rgba(237,28,36,.2)}
  .tw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--bg3);padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);text-align:left;white-space:nowrap}
  tbody tr{border-top:1px solid var(--border)}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  tbody td{padding:11px 16px;font-size:13px}
  .tg{color:var(--gray)}
  .tr{color:var(--red);font-weight:600}
  .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:rgba(69,94,110,.3);color:#8ab4c8}
  .empty{padding:40px;text-align:center;color:var(--gray);font-size:13px}
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-ov.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .modal-h{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
  .modal-title{font-size:15px;font-weight:700}
  .btn-x{background:var(--bg3);border:1px solid var(--border2);color:var(--gray);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .15s}
  .btn-x:hover{color:var(--white)}
  .modal-b{padding:24px}
  .f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-f{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
  .btn-cancel{background:var(--bg3);border:1px solid var(--border2);color:var(--white);border-radius:var(--radius);padding:10px 18px;font-size:13px;font-weight:600;transition:all .15s}
  .btn-cancel:hover{background:var(--bg4)}
  .btn-save{background:var(--red);color:#fff;border-radius:var(--radius);padding:10px 20px;font-size:13px;font-weight:700;transition:background .15s}
  .btn-save:hover{background:var(--red2)}
  .btn-save:disabled{opacity:.6;cursor:not-allowed}
  .tabs{display:flex;gap:4px;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:22px;width:fit-content}
  .tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .15s}
  .tab:hover{color:var(--white)}
  .tab.active{background:var(--bg2);color:var(--white)}
  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .fsel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 12px;color:var(--white);font-size:12px;font-weight:500}
  .fsel:focus{outline:none;border-color:var(--red)}
  .fsel option{background:var(--bg3)}
  .rcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
  .rcard-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:16px}
  .rrow{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
  .rrow:last-child{border-bottom:none}
  .rname{font-size:13px;font-weight:500;flex:0 0 130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rbar-w{flex:1;height:4px;background:var(--bg4);border-radius:2px;margin:0 12px;overflow:hidden}
  .rbar{height:100%;background:var(--red);border-radius:2px}
  .rhours{font-size:13px;font-weight:700;color:var(--red);flex:0 0 44px;text-align:right}
  .rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:24px}
  #toast-c{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;min-width:240px;display:flex;align-items:center;gap:10px;animation:sIn .2s ease}
  .toast.success{border-color:rgba(16,185,129,.4);color:#34d399}
  .toast.error{border-color:rgba(237,28,36,.4);color:#f87171}
  @keyframes sIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
  .spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:r .7s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .lc{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--gray);font-size:13px}
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
    .main{margin-left:0}.topbar{padding:0 16px}.content{padding:16px}
    .f-row{grid-template-columns:1fr}.t-clock{font-size:20px}
    #menu-btn{display:flex !important}
  }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="auth-logo-tgt">TGT</span>
      <div>
        <div class="auth-logo-sub">Time</div>
        <div style="font-size:8px;color:var(--gray2);letter-spacing:1px;margin-top:2px">CONTROLE DE HORAS</div>
      </div>
    </div>
    <h2 class="auth-title">Acesso</h2>
    <p class="auth-sub">Entre com suas credenciais da TGT Studio</p>
    <div id="auth-err" class="auth-error"></div>
    <form id="login-form">
      <div class="f-field"><label class="f-label">E-mail</label><input class="f-input" id="fi-email" type="email" placeholder="seu@tgtstudio.com.br" required></div>
      <div class="f-field"><label class="f-label">Senha</label><input class="f-input" id="fi-pass" type="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn-primary" id="login-btn">Entrar</button>
    </form>
  </div>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="s-logo">
      <span class="s-tgt">TGT</span><div class="s-divider"></div>
      <div class="s-sub">Time<br>Tracker</div>
    </div>
    <nav>
      <div class="n-sec">Principal</div>
      <div class="n-item active" data-p="timer" onclick="nav('timer')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Timer
      </div>
      <div class="n-item" data-p="entries" onclick="nav('entries')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Lançamentos
      </div>
      <div class="n-sec">Relatórios</div>
      <div class="n-item" data-p="r-team" onclick="nav('r-team')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Por Time
      </div>
      <div class="n-item" data-p="r-client" onclick="nav('r-client')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Por Cliente
      </div>
      <div class="n-item" data-p="r-person" onclick="nav('r-person')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Por Pessoa
      </div>
      <div class="n-sec">Admin</div>
      <div class="n-item" data-p="members" onclick="nav('members')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>Pessoas
      </div>
      <div class="n-item" data-p="clients" onclick="nav('clients')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Clientes
      </div>
    </nav>
    <div class="s-user">
      <div class="s-avatar" id="u-av">?</div>
      <div style="flex:1;min-width:0">
        <div class="s-uname" id="u-name">—</div>
        <div class="s-urole" id="u-role">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()" title="Sair">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>
  
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="menu-btn" onclick="toggleSb()" style="display:none;background:none;color:var(--white);padding:4px">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="t-title" id="pg-title">Timer</span>
      </div>
      <span style="font-size:12px;color:var(--gray)" id="cur-date"></span>
    </div>
    <div class="content" id="pg"></div>
  </div>
</div>

<!-- Entry Modal -->
<div class="modal-ov" id="m-entry">
  <div class="modal">
    <div class="modal-h"><span class="modal-title" id="m-entry-title">Novo Lançamento</span><button class="btn-x" onclick="closeM('m-entry')">✕</button></div>
    <div class="modal-b">
      <div class="f-field"><label class="f-label">Descrição</label><input class="f-input" id="e-desc" placeholder="Ex: Criação posts semana 1"></div>
      <div class="f-row">
        <div class="f-field"><label class="f-label">Data</label><input class="f-input" id="e-date" type="date"></div>
        <div class="f-field"><label class="f-label">Horas</label><input class="f-input" id="e-hours" type="number" step="0.25" min="0.25" max="24" placeholder="2.5"></div>
      </div>
      <div class="f-row">
        <div class="f-field"><label class="f-label">Cliente</label><select class="f-input" id="e-client"></select></div>
        <div class="f-field"><label class="f-label">Pessoa</label><select class="f-input" id="e-member"></select></div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn-cancel" onclick="closeM('m-entry')">Cancelar</button>
      <button class="btn-save" id="e-save" onclick="saveEntry()">Salvar</button>
    </div>
  </div>
</div>

<!-- Member Modal -->
<div class="modal-ov" id="m-member">
  <div class="modal">
    <div class="modal-h"><span class="modal-title">Nova Pessoa</span><button class="btn-x" onclick="closeM('m-member')">✕</button></div>
    <div class="modal-b">
      <div class="f-field"><label class="f-label">Nome Completo</label><input class="f-input" id="mb-name" placeholder="Nome"></div>
      <div class="f-row">
        <div class="f-field"><label class="f-label">E-mail</label><input class="f-input" id="mb-email" type="email" placeholder="email@tgtstudio.com.br"></div>
        <div class="f-field"><label class="f-label">Função</label><input class="f-input" id="mb-role" placeholder="Designer"></div>
      </div>
      <div class="f-row">
        <div class="f-field"><label class="f-label">Time</label>
          <select class="f-input" id="mb-team"><option value="T1">T1</option><option value="T3">T3</option><option value="T4">T4</option><option value="Pack">Pack</option><option value="PROD">PROD</option><option value="ADM">ADM</option></select>
        </div>
        <div class="f-field"><label class="f-label">Capacidade (h/mês)</label><input class="f-input" id="mb-cap" type="number" value="140"></div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn-cancel" onclick="closeM('m-member')">Cancelar</button>
      <button class="btn-save" onclick="saveMember()">Salvar</button>
    </div>
  </div>
</div>

<!-- Client Modal -->
<div class="modal-ov" id="m-client">
  <div class="modal">
    <div class="modal-h"><span class="modal-title">Novo Cliente</span><button class="btn-x" onclick="closeM('m-client')">✕</button></div>
    <div class="modal-b">
      <div class="f-field"><label class="f-label">Nome do Cliente</label><input class="f-input" id="cl-name" placeholder="Ex: Kerry Institucional"></div>
      <div class="f-row">
        <div class="f-field"><label class="f-label">Time</label>

async function req(method,path,body,tok){
  const h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${tok||SB_KEY}`};
  if(method==='POST')h['Prefer']='return=representation';
  if(method==='PATCH')h['Prefer']='return=representation';
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{method,headers:h,body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||r.statusText)}
  if(r.status===204)return null;
  return r.json();
}
async function authReq(method,path,body){
  const h={'Content-Type':'application/json','apikey':SB_KEY};
  const r=await fetch(`${SB_URL}/auth/v1/${path}`,{method,headers:h,body:body?JSON.stringify(body):undefined});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error_description||d.msg||'Erro');
  return d;
}
const tok=()=>sess?.access_token;

document.getElementById('login-form').addEventListener('submit',async e=>{

  try{
    sess=await authReq('POST','token?grant_type=password',{email:document.getElementById('fi-email').value,password:document.getElementById('fi-pass').value});
    localStorage.setItem('tgt_sess',JSON.stringify(sess));
    await boot();
  }catch(ex){err.textContent='E-mail ou senha incorretos.';err.classList.add('show');}
  finally{btn.disabled=false;btn.textContent='Entrar';}
});

}

async function boot(){

}

async function loadAll(){
  try{
    [members,clients]=await Promise.all([
      req('GET','tt_members?select=*&order=name',null,tok()),
      req('GET','tt_clients?select=*&order=name',null,tok())

      curMember=members.find(m=>m.email===sess.user.email)||members[0];

        const ini=curMember.name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();

}

async function loadEntries(month,mid,cid){
  let q=`tt_time_entries?select=*,member:tt_members(id,name,team),client:tt_clients(id,name,team)&order=date.desc,created_at.desc`;
  if(month)q+=`&date=gte.${month}-01&date=lte.${month}-31`;
  if(mid)q+=`&member_id=eq.${mid}`;
  if(cid)q+=`&client_id=eq.${cid}`;
  return req('GET',q,null,tok());
}

function startTick(){
  clearInterval(timerInt);
  timerInt=setInterval(()=>{if(timerStart){timerSec=(Date.now()-timerStart.getTime())/1000;updClock();}},1000);
}
function updClock(){
  const el=document.getElementById('t-clock');if(!el)return;
  const h=Math.floor(timerSec/3600),m=Math.floor((timerSec%3600)/60),s=Math.floor(timerSec%60);
  el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='t-clock'+(running?' on':'');
}
async function startTimer(){
  const desc=document.getElementById('t-desc')?.value?.trim(),cid=document.getElementById('t-client')?.value;
  if(!desc){toast('Informe uma descrição','error');return;}
  if(!cid){toast('Selecione um cliente','error');return;}
  if(!curMember){toast('Membro não encontrado','error');return;}
  const now=new Date().toISOString();
  running={description:desc,client_id:cid,member_id:curMember.id,started_at:now,date:now.split('T')[0]};
  timerStart=new Date(now);timerSec=0;
  localStorage.setItem('tgt_run',JSON.stringify(running));
  startTick();renderTimerBtns();toast('Timer iniciado','success');
}
async function stopTimer(){
  if(!running||!timerStart)return;
  clearInterval(timerInt);
  const hours=timerSec/3600;
  if(hours<0.01){toast('Tempo muito curto','error');resetTimer();return;}
  try{
    await req('POST','tt_time_entries',{description:running.description,client_id:running.client_id,member_id:running.member_id,date:running.date,hours:Math.round(hours*100)/100,started_at:running.started_at,ended_at:new Date().toISOString()},tok());
    toast(`${fmtH(hours)} registradas`,'success');resetTimer();
    if(curPage==='entries')renderPage();else if(curPage==='timer')loadToday();
  }catch(ex){toast('Erro: '+ex.message,'error');}
}
function resetTimer(){running=null;timerStart=null;timerSec=0;localStorage.removeItem('tgt_run');clearInterval(timerInt);updClock();renderTimerBtns();}
function renderTimerBtns(){
  const s=document.getElementById('t-start'),p=document.getElementById('t-stop');
  if(!s||!p)return;
  s.style.display=running?'none':'flex';p.style.display=running?'flex':'none';
}

const TITLES={timer:'Timer',entries:'Lançamentos','r-team':'Relatório por Time','r-client':'Relatório por Cliente','r-person':'Relatório por Pessoa',members:'Pessoas',clients:'Clientes'};

  curPage=page;

}

async function loadToday(){
  if(curPage!=='timer')return;
  const today=new Date().toISOString().split('T')[0];
  try{
    const data=await req('GET',`tt_time_entries?select=*,member:tt_members(id,name),client:tt_clients(id,name)&date=eq.${today}&order=created_at.desc`,null,tok())||[];
    loadStats(data);
    const w=document.getElementById('today-wrap');if(!w)return;
    w.innerHTML=data.length?buildTable(data,false):'<div class="empty">Nenhum lançamento hoje.</div>';
  }catch{}
}

async function loadStats(todayD){
  try{
    const today=new Date(),ws=new Date(today);ws.setDate(today.getDate()-today.getDay()+1);
    const th=(todayD||[]).reduce((a,e)=>a+(e.hours||0),0);
    if(document.getElementById('st-today'))document.getElementById('st-today').textContent=fmtH(th);
    if(!curMember)return;
    const wD=await req('GET',`tt_time_entries?select=hours&date=gte.${ws.toISOString().split('T')[0]}&member_id=eq.${curMember.id}`,null,tok())||[];
    const wH=wD.reduce((a,e)=>a+(e.hours||0),0);
    if(document.getElementById('st-week'))document.getElementById('st-week').textContent=fmtH(wH);
    const mD=await req('GET',`tt_time_entries?select=hours&date=gte.${fMonth}-01&member_id=eq.${curMember.id}`,null,tok())||[];
    const mH=mD.reduce((a,e)=>a+(e.hours||0),0),cap=curMember.capacity_hours||140,pct=Math.min(100,Math.round(mH/cap*100));
    if(document.getElementById('st-month'))document.getElementById('st-month').textContent=fmtH(mH);
    if(document.getElementById('st-msub'))document.getElementById('st-msub').textContent=`de ${cap}h meta (${pct}%)`;
    if(document.getElementById('st-mbar'))document.getElementById('st-mbar').style.width=pct+'%';
  }catch{}
}

function onFChange(){

function buildTable(data,showM){
  return `<div class="tw"><table>
    <thead><tr><th>Data</th><th>Descrição</th><th>Cliente</th>${showM?'<th>Pessoa</th>':''}<th>Horas</th><th></th></tr></thead>
    <tbody>${data.map(e=>`<tr>

      <td>${e.description||'—'}</td>
      <td>${e.client?.name||clients.find(c=>c.id==e.client_id)?.name||'—'}</td>
      ${showM?`<td><span class="badge">${e.member?.name?.split(' ')[0]||'—'}</span></td>`:''}
      <td class="tr">${fmtH(e.hours||0)}</td>
      <td style="white-space:nowrap">
        <button class="btn-sm" onclick="editEntry('${e.id}')" style="padding:4px 8px;font-size:11px;margin-right:4px">✎</button>
        <button class="btn-sm" onclick="delEntry('${e.id}')" style="padding:4px 8px;font-size:11px;color:var(--gray2)">✕</button>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function pgRTeam(el){
  el.innerHTML=`<div class="filters"><select class="fsel" id="rt-mo" onchange="pgRTeam(document.getElementById('pg'))">${buildMoOpts()}</select></div><div id="rt-c" class="lc"><div class="spin"></div></div>`;
  document.getElementById('rt-mo').value=fMonth;
  const data=await loadEntries(fMonth,'','')||[],rc=document.getElementById('rt-c');
  const teams=['T1','T3','T4','Pack','PROD','ADM'],td={};
  teams.forEach(t=>td[t]={h:0,mb:{}});
  data.forEach(e=>{
    const m=members.find(x=>x.id===e.member_id),team=m?.team||'ADM';
    if(!td[team])td[team]={h:0,mb:{}};
    td[team].h+=e.hours||0;
    if(!td[team].mb[e.member_id])td[team].mb[e.member_id]={name:m?.name||'?',h:0};
    td[team].mb[e.member_id].h+=e.hours||0;
  });
  const mxH=Math.max(...Object.values(td).map(t=>t.h),1);
  rc.className='rgrid';
  rc.innerHTML=teams.filter(t=>td[t].h>0).map(t=>{
    const tv=td[t],mbs=Object.values(tv.mb).sort((a,b)=>b.h-a.h);
    return `<div class="rcard"><div class="rcard-title">${t} — ${fmtH(tv.h)}</div>
      ${mbs.map(m=>`<div class="rrow"><span class="rname">${m.name.split(' ').slice(0,2).join(' ')}</span><div class="rbar-w"><div class="rbar" style="width:${Math.round(m.h/tv.h*100)}%"></div></div><span class="rhours">${fmtH(m.h)}</span></div>`).join('')}
    </div>`;
  }).join('');
}

async function pgRClient(el){
  el.innerHTML=`<div class="filters"><select class="fsel" id="rc-mo" onchange="pgRClient(document.getElementById('pg'))">${buildMoOpts()}</select></div><div id="rc-c" class="lc"><div class="spin"></div></div>`;
  document.getElementById('rc-mo').value=fMonth;
  const data=await loadEntries(fMonth,'','')||[],rc=document.getElementById('rc-c');
  const cd={};
  data.forEach(e=>{
    if(!cd[e.client_id]){const c=clients.find(c=>c.id===e.client_id);cd[e.client_id]={name:c?.name||'?',team:c?.team||'—',target:c?.target_hours||0,h:0};}
    cd[e.client_id].h+=e.hours||0;
  });
  const sorted=Object.values(cd).sort((a,b)=>b.h-a.h);
  rc.className='tw';
  rc.innerHTML=`<table><thead><tr><th>Cliente</th><th>Time</th><th>Meta</th><th>Realizado</th><th>%</th></tr></thead><tbody>
    ${sorted.map(c=>{
      const pct=c.target>0?Math.round(c.h/c.target*100):null;
      const col=pct!=null?(pct>=100?'#34d399':pct>=70?'#fbbf24':'var(--red)'):'var(--gray)';
      return `<tr><td style="font-weight:600">${c.name}</td><td><span class="badge">${c.team}</span></td><td class="tg">${c.target?fmtH(c.target):'—'}</td><td class="tr">${fmtH(c.h)}</td><td style="color:${col};font-weight:700">${pct!=null?pct+'%':'—'}</td></tr>`;
    }).join('')}
  </tbody></table>`;
}

async function pgRPerson(el){
  el.innerHTML=`<div class="filters"><select class="fsel" id="rp-mo" onchange="pgRPerson(document.getElementById('pg'))">${buildMoOpts()}</select></div><div id="rp-c" class="lc"><div class="spin"></div></div>`;
  document.getElementById('rp-mo').value=fMonth;
  const data=await loadEntries(fMonth,'','')||[],rc=document.getElementById('rp-c');
  const md={};
  data.forEach(e=>{
    if(!md[e.member_id]){const m=members.find(m=>m.id===e.member_id);md[e.member_id]={name:m?.name||'?',team:m?.team||'—',cap:m?.capacity_hours||140,h:0,cls:{}};}
    md[e.member_id].h+=e.hours||0;
    const cn=clients.find(c=>c.id===e.client_id)?.name||'?';
    if(!md[e.member_id].cls[cn])md[e.member_id].cls[cn]=0;

  });
  const sorted=Object.values(md).sort((a,b)=>b.h-a.h);
  rc.className='rgrid';
  rc.innerHTML=sorted.map(m=>{
    const pct=Math.min(100,Math.round(m.h/m.cap*100));
    const barCol=pct>=80?'#34d399':'var(--red)';
    const top=Object.entries(m.cls).sort((a,b)=>b[1]-a[1]).slice(0,4);
    return `<div class="rcard">
      <div class="rcard-title">${m.name.split(' ').slice(0,2).join(' ')} · <span style="color:var(--gray)">${m.team}</span></div>
      <div style="margin-bottom:12px">

        </div>
        <div class="stat-prog"><div class="stat-prog-bar" style="width:${pct}%;background:${barCol}"></div></div>

    </div>`;
  }).join('');
}

  openM('m-entry');
}

function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editId=id;
  document.getElementById('m-entry-title').textContent='Editar Lançamento';
  document.getElementById('e-desc').value=e.description||'';
  document.getElementById('e-date').value=e.date||'';
  document.getElementById('e-hours').value=e.hours||'';
  document.getElementById('e-client').innerHTML='<option value="">Selecionar</option>'+clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('e-client').value=e.client_id||'';
  const mm=document.getElementById('e-member');
  mm.innerHTML='<option value="">Selecionar</option>'+members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  mm.value=e.member_id||'';
  openM('m-entry');
}

async function saveEntry(){
  const btn=document.getElementById('e-save');
  const p={description:document.getElementById('e-desc').value.trim(),date:document.getElementById('e-date').value,hours:parseFloat(document.getElementById('e-hours').value),client_id:document.getElementById('e-client').value,member_id:document.getElementById('e-member').value};
  if(!p.description||!p.date||!p.hours||!p.client_id||!p.member_id){toast('Preencha todos os campos','error');return;}
  btn.disabled=true;btn.textContent='Salvando...';
  try{
    if(editId)await req('PATCH',`tt_time_entries?id=eq.${editId}`,p,tok());
    else await req('POST','tt_time_entries',p,tok());
    toast(editId?'Atualizado':'Salvo','success');closeM('m-entry');
    if(curPage==='entries')await loadETable();else if(curPage==='timer')loadToday();
  }catch(ex){toast('Erro: '+ex.message,'error');}
  finally{btn.disabled=false;btn.textContent='Salvar';}
}

async function delEntry(id){
  if(!confirm('Excluir este lançamento?'))return;
  try{await req('DELETE',`tt_time_entries?id=eq.${id}`,null,tok());entries=entries.filter(e=>e.id!==id);toast('Removido','success');if(curPage==='entries')await loadETable();else if(curPage==='timer')loadToday();}
  catch(ex){toast('Erro: '+ex.message,'error');}
}

async function saveMember(){
  const p={name:document.getElementById('mb-name').value.trim(),email:document.getElementById('mb-email').value.trim(),role:document.getElementById('mb-role').value.trim(),team:document.getElementById('mb-team').value,capacity_hours:parseInt(document.getElementById('mb-cap').value)||140};
  if(!p.name){toast('Nome obrigatório','error');return;}
  try{await req('POST','tt_members',p,tok());toast('Pessoa adicionada','success');closeM('m-member');await loadAll();renderPage();}
  catch(ex){toast('Erro: '+ex.message,'error');}
}

async function saveClient(){
  const p={name:document.getElementById('cl-name').value.trim(),team:document.getElementById('cl-team').value,target_hours:parseInt(document.getElementById('cl-target').value)||null};
  if(!p.name){toast('Nome obrigatório','error');return;}
  try{await req('POST','tt_clients',p,tok());toast('Cliente adicionado','success');closeM('m-client');await loadAll();renderPage();}
  catch(ex){toast('Erro: '+ex.message,'error');}
}

function exportCsv(){
  if(!entries.length){toast('Sem dados','error');return;}
  const rows=[['Data','Descrição','Cliente','Pessoa','Horas']];
  entries.forEach(e=>rows.push([e.date,e.description||'',e.client?.name||clients.find(c=>c.id==e.client_id)?.name||'',e.member?.name||members.find(m=>m.id==e.member_id)?.name||'',(e.hours||0).toString().replace('.',',')]));
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(';')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`tgt-time-${fMonth}.csv`;a.click();
}

function fmtH(h){const n=Math.round(h*100)/100;return n===Math.round(n)?n+'h':n.toFixed(1)+'h';}
function fmtD(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}`;}
function buildMoOpts(){const months=[];const now=new Date();for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const val=d.toISOString().slice(0,7);const label=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});months.push(`<option value="${val}"${val===fMonth?' selected':''}>${label}</option>`);}return months.join('');}
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');}

function toast(msg,type='success'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${type==='success'?'✓':'✕'}</span> ${msg}`;
  document.getElementById('toast-c').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

if(window.innerWidth<=768)document.getElementById('menu-btn').style.display='flex';
window.addEventListener('resize',()=>{const b=document.getElementById('menu-btn');if(b)b.style.display=window.innerWidth<=768?'flex':'none';});

(async()=>{
  const sv=localStorage.getItem('tgt_sess');
  if(sv){
    try{
      const s=JSON.parse(sv);
      const r=await fetch(`${SB_URL}/auth/v1/user`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${s.access_token}`}});
      if(r.ok){sess=s;await boot();return;}
    }catch{}
    localStorage.removeItem('tgt_sess');
  }
  document.getElementById('auth-screen').style.display='flex';
})();
</script>
